name = "serverless-registry"

workers_dev = true
main = "./index.ts"
compatibility_date = "2024-09-09"
compatibility_flags = ["nodejs_compat"]

r2_buckets = [
  { binding = "REGISTRY", bucket_name = "zot" }
]

# Secrets (USERNAME / PASSWORD / READONLY_USERNAME / READONLY_PASSWORD /
# JWT_REGISTRY_TOKENS_PUBLIC_KEY) 通过 `wrangler secret put` 或 Dashboard
# 的 Variables → Encrypted 注入，不放这里。
